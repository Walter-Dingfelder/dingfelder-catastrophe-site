<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Participate — C.A.T.A.S.T.R.O.P.H.E.</title>
  <meta name="description" content="Participation intake for C.A.T.A.S.T.R.O.P.H.E. — updates, pilot opportunities, and collaborative capability development." />

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      line-height: 1.5;
      background: #ffffff;
      color: #111;
    }

    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 40px 20px 60px;
    }

    h1 {
      font-size: 34px;
      margin-bottom: 10px;
    }

    p {
      margin: 10px 0;
    }

    .card {
      border: 1px solid rgba(0,0,0,.15);
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-top: 14px;
      margin-bottom: 4px;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid rgba(0,0,0,.2);
      font-size: 15px;
    }

    textarea {
      min-height: 120px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    @media (max-width: 720px) {
      .row { grid-template-columns: 1fr; }
    }

    .consent {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-top: 14px;
    }

    .consent input {
      width: auto;
      margin-top: 4px;
    }

    button {
      margin-top: 16px;
      padding: 10px 16px;
      border-radius: 10px;
      border: none;
      background: #111;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    .small {
      font-size: 14px;
      opacity: .8;
      margin-top: 12px;
    }
  </style>
</head>

<body>
  <main>
    <h1>Participate in C.A.T.A.S.T.R.O.P.H.E.</h1>

    <p>
      Participation establishes communication and optional collaboration as the program evolves.
      It does not create obligation. You may participate as an individual, organization, or observer.
    </p>

    <div class="card">

      <form
        name="cat-participation"
        method="POST"
        data-netlify="true"
        data-netlify-honeypot="bot-field"
        action="/participate/thanks/"
      >
        <input type="hidden" name="form-name" value="cat-participation" />

        <p hidden>
          <label>Don’t fill this out if you're human:
            <input name="bot-field" />
          </label>
        </p>

        <label>How do you relate to this capability?</label>
        <select name="role" required>
          <option value="">Select role…</option>
          <option>Fire / EMS</option>
          <option>Industrial operator or technician</option>
          <option>Plant / operations leadership</option>
          <option>Safety professional</option>
          <option>Systems integrator</option>
          <option>Equipment supplier</option>
          <option>Research / academic</option>
          <option>Public observer</option>
          <option>Other</option>
        </select>

        <div class="row">
          <div>
            <label>Name (optional)</label>
            <input type="text" name="name">
          </div>

          <div>
            <label>Organization (optional)</label>
            <input type="text" name="organization">
          </div>
        </div>

        <div class="row">
          <div>
            <label>Email (required)</label>
            <input type="email" name="email" required>
          </div>

          <div>
            <label>City / Region (optional)</label>
            <input type="text" name="location">
          </div>
        </div>

        <label>Anything you’d like us to know? (optional)</label>
        <textarea name="context"></textarea>

        <div class="consent">
          <input type="checkbox" name="consent" required>
          <label>You may contact me regarding updates, participation opportunities, or pilot activities related to C.A.T.A.S.T.R.O.P.H.E.</label>
        </div>

        <button type="submit">Submit Participation</button>

      </form>

    </div>

    <p class="small">
      Return to <a href="/c-a-t-a-s-t-r-o-p-h-e/">C.A.T.A.S.T.R.O.P.H.E.</a>
    </p>

  </main>
</body>
</html>
