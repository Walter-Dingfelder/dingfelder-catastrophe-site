<!-- ===================================================== -->
<!-- C.A.T.A.S.T.R.O.P.H.E.™ EMT-SOS HOMEPAGE POPUP (V4)   -->
<!-- - Works in GoDaddy by building DOM in JS              -->
<!-- - catTest=1 forces popup on ANY page for testing      -->
<!-- ===================================================== -->

<div style="background:#000;height:1px;overflow:hidden;">
<script>
(function(){
  var VIDEO_URL = "https://img1.wsimg.com/blobby/go/5ae6b287-3756-4b7e-90b7-04bfd09dd096/video/grok-video-6c108f81-1b50-4ec4-b360-7984afc8a73.mp4";
  var CTA_URL   = "https://dingfelder.co/c-a-t-a-s-t-r-o-p-h-e";

  function onReady(fn){
    if (document.readyState === "complete" || document.readyState === "interactive") fn();
    else document.addEventListener("DOMContentLoaded", fn);
  }

  function isHome(){
    var p = (location.pathname || "/").toLowerCase();
    // GoDaddy sometimes serves home as "/" but we allow a couple common variants
    return (p === "/" || p === "" || p.endsWith("/index.html") || p.endsWith("/home"));
  }

  function addDebugBadge(){
    // Remove this whole function once you're satisfied it's running.
    var badge = document.createElement("div");
    badge.textContent = "CAT POPUP SCRIPT LOADED";
    badge.style.cssText =
      "position:fixed;left:10px;bottom:10px;z-index:2147483647;" +
      "background:rgba(0,0,0,.75);color:#fbbf24;border:1px dashed rgba(251,191,36,.6);" +
      "padding:6px 10px;border-radius:10px;font:700 11px/1.2 system-ui,Segoe UI,Arial;" +
      "letter-spacing:.08em;text-transform:uppercase;";
    document.body.appendChild(badge);
    setTimeout(function(){ if(badge && badge.parentNode) badge.parentNode.removeChild(badge); }, 2500);
  }

  function buildPopup(){
    var overlay = document.createElement("div");
    overlay.id = "catOverlay_v4";
    overlay.style.cssText =
      "position:fixed;inset:0;z-index:2147483647;display:flex;align-items:center;justify-content:center;" +
      "padding:3vh 2vw;background:rgba(5,10,18,.90);";

    var card = document.createElement("div");
    card.id = "catCard_v4";
    card.style.cssText =
      "position:relative;width:min(96vw,1500px);max-height:92vh;" +
      "background:#0b1118;border-radius:22px;box-shadow:0 30px 90px rgba(0,0,0,.7);" +
      "padding:16px 16px 18px;text-align:center;color:#eaf2ff;";

    var close = document.createElement("button");
    close.type = "button";
    close.setAttribute("aria-label","Close popup");
    close.innerHTML = "✕";
    close.style.cssText =
      "position:absolute;top:10px;right:12px;border:none;cursor:pointer;" +
      "background:rgba(0,0,0,.45);color:#d0d7e2;border-radius:999px;padding:6px 10px;" +
      "font:800 18px/1 system-ui,Segoe UI,Arial;";
    close.onclick = remove;

    var video = document.createElement("video");
    video.autoplay = true;
    video.muted = true;
    video.loop = true;
    video.playsInline = true;
    video.setAttribute("playsinline","");
    video.style.cssText =
      "display:block;width:100%;height:auto;max-height:74vh;object-fit:contain;" +
      "border-radius:18px;background:#000;";

    var source = document.createElement("source");
    source.src = VIDEO_URL;
    source.type = "video/mp4";
    video.appendChild(source);

    var title = document.createElement("div");
    title.innerHTML = 'Are you ready for this <span style="color:#ef4444;">C.A.T.A.S.T.R.O.P.H.E.</span>?';
    title.style.cssText =
      "margin:12px 0 10px;font:900 clamp(22px,2.6vw,34px)/1.15 system-ui,Segoe UI,Arial;" +
      "letter-spacing:.04em;";

    var btn = document.createElement("button");
    btn.type = "button";
    btn.textContent = "Get your PPE and follow me!";
    btn.style.cssText =
      "margin-top:10px;padding:16px 26px;border:none;border-radius:14px;cursor:pointer;" +
      "color:#0b1118;background:linear-gradient(135deg,#22c55e,#2dd4bf);" +
      "box-shadow:0 10px 28px rgba(34,197,94,.35);" +
      "font:900 16px/1 system-ui,Segoe UI,Arial;letter-spacing:.04em;text-transform:uppercase;";
    btn.onclick = function(){ location.href = CTA_URL; };

    card.appendChild(close);
    card.appendChild(video);
    card.appendChild(title);
    card.appendChild(btn);
    overlay.appendChild(card);

    overlay.addEventListener("click", function(e){
      if(e.target === overlay) remove();
    });
    document.addEventListener("keydown", function(e){
      if(e.key === "Escape") remove();
    });

    document.body.appendChild(overlay);

    // iOS/Safari sometimes needs an explicit play attempt
    try { video.play().catch(function(){}); } catch(e){}

    function remove(){
      if(overlay && overlay.parentNode) overlay.parentNode.removeChild(overlay);
    }
  }

  onReady(function(){
    var params = new URLSearchParams(location.search);
    var forceTest = params.get("catTest") === "1";

    // QUICK CONFIRM: script is running
    addDebugBadge();

    // Gate: show only on homepage, unless forced test
    if(!forceTest && !isHome()) return;

    // Once per session unless forced
    var key = "catPopupSeen_v4";
    try{
      if(sessionStorage.getItem(key) && !forceTest) return;
      sessionStorage.setItem(key, "true");
    }catch(e){}

    setTimeout(buildPopup, 450);
  });
})();
</script>
</div>
